<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация-GoodHost</title>
  <link rel="stylesheet" href="/static/css/registration.css"/>
</head>
<body>

  <header>
    <div class="logo">
      <img src="/static/iconpicture.png" alt="GoodHost лого" style="height:45px; width:auto;"/>
      <span>GoodHost</span>
    </div>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Меню">&#9776;</button>
    <nav>
      <a href="/">Начало</a>
      <a href="/registration">Регистрация</a>
      <a href="/hosts">Домакини</a>
      <a href="/rules">Правила</a>
      {% if is_logged_in %}
        <div class="user-menu">
          <span class="user-menu-name">{{ current_user_name }}</span>
          <div class="user-dropdown">
            <a href="/profile">Моя профил</a>
            <a href="/logout">Изход</a>
          </div>
        </div>
      {% else %}
        <a href="/login"><button>Вход</button></a>
      {% endif %}
    </nav>
  </header>

  <main>
    <h1>Регистрирай се тук!</h1>
    
    <a href="/hostsregistration"><button>Домакин</button></a>
    <a href="/register/volunteer"><button>Доброволец</button></a>

    
  </main>


  <footer>
    <p>© 2026 GoodHost. Всички права запазени.</p>

    <p>Контакти: <a href="mailto:goodhost230@gmail.com">goodhost230@gmail.com</a></p>

    <div>
      <a href="https://www.facebook.com/profile.php?id=61576516620688" target="_blank">Facebook</a>
      <a href="https://www.instagram.com/goodhost12/?hl=bg" target="_blank" >Instagram</a>
    </div>
  </footer>

  <script src="/static/js/nav.js"></script>
</body>
</html>
